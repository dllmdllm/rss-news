name: Update RSS News

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:           # allow manual trigger

concurrency:
  group: update-rss
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch RSS, scrape & summarise
        run: python build.py
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/articles.json docs/data/summaries.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update articles $(date -u '+%Y-%m-%d %H:%M UTC')"
          git fetch origin main
          git rebase origin/main -X ours || (git rebase --abort && true)
          git push --force-with-lease
