name: Update RSS News

on:
  schedule:
    - cron: "*/20 * * * *"   # every 20 minutes
  workflow_dispatch:           # allow manual trigger
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build.py"
      - "requirements.txt"

concurrency:
  group: update-rss
  # Let the running build finish — cancelling it mid-way when a build exceeds
  # the 20-min cron interval means nothing ever gets pushed. A newer queued run
  # will supersede older pending ones automatically.
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 15
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: python -m pip install --cache-dir "$env:LOCALAPPDATA\pip\Cache" -r requirements.txt

      - name: Fetch RSS, scrape & analyse
        run: python build.py
        env:
          MINIMAX_API_KEY:      ${{ secrets.MINIMAX_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Run tests
        run: python -m pytest tests -q
        continue-on-error: true

      - name: Commit & push if changed
        # Use Git Bash explicitly — `shell: bash` on self-hosted Windows
        # picks up WSL bash first from PATH, which can't handle Windows
        # paths like `C:\actions-runner\_work\...` that Actions injects.
        # The runner parses `shell:` by whitespace, so `C:\Program Files\…`
        # breaks (`Which2: 'C:\Program'` → ArgumentException). Use the 8.3
        # short name `PROGRA~1` to keep the path whitespace-free.
        shell: 'C:\PROGRA~1\Git\bin\bash.exe -eo pipefail {0}'
        run: |
          # Bash sidesteps PowerShell's `$ErrorActionPreference = 'stop'`
          # default, which on Windows hosts turns git's stderr progress into
          # terminating ErrorRecords and kills the step before push completes.
          set +e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/articles.json docs/data/articles_index.json docs/data/analyses.json docs/data/feed.xml docs/data/feed_http_cache.json docs/data/content docs/data/graph.json docs/data/upcoming.json docs/data/panel_digests.json docs/data/embeddings.bin docs/data/embeddings_meta.json docs/data/similar.json docs/data/entities.json
          git add docs/data/breaking_alerts.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          ts="$(date -u +'%Y-%m-%d %H:%M') UTC"
          git commit -m "chore: update articles $ts" || { echo "commit failed"; exit 1; }

          # Retry fetch → rebase → push up to 3 times. Each iteration
          # re-syncs origin/main so a concurrent push (Codex, or a prior
          # stuck chore commit) doesn't permanently wedge this one.
          # After rebase, HEAD is strictly ahead of origin/main, so plain
          # push is a fast-forward — no force / force-with-lease needed.
          for i in 1 2 3; do
            echo "=== attempt $i ==="
            if ! git fetch origin main; then
              echo "fetch failed on attempt $i"
              sleep 3
              continue
            fi
            if ! git rebase origin/main -X ours; then
              echo "rebase failed on attempt $i — aborting"
              git rebase --abort
              sleep 3
              continue
            fi
            echo "--- git log before push ---"
            git log --oneline origin/main..HEAD
            if git push origin HEAD:main; then
              echo "push OK on attempt $i"
              exit 0
            fi
            echo "push failed on attempt $i"
            sleep 5
          done
          echo "push failed after 3 attempts — see output above"
          exit 1

      # Optional: notify Slack on build failure. Enable by uncommenting and
      # adding a SLACK_WEBHOOK_URL secret (Incoming Webhook URL from Slack
      # App → Features → Incoming Webhooks).
      # - name: Notify Slack on failure
      #   if: failure()
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      #   run: |
      #     $body = @{
      #       text = "rss-news build failed — run $env:GITHUB_RUN_ID on $env:GITHUB_REF"
      #     } | ConvertTo-Json
      #     Invoke-RestMethod -Uri $env:SLACK_WEBHOOK_URL -Method Post -Body $body -ContentType 'application/json'
