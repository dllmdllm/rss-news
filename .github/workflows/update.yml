name: Update RSS News

on:
  schedule:
    - cron: "*/20 * * * *"   # every 20 minutes
  workflow_dispatch:           # allow manual trigger
  push:
    branches: [main]
    paths-ignore:
      - "docs/data/**"        # avoid loop from runner's own commits

concurrency:
  group: update-rss
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch RSS, scrape & summarise
        run: python build.py
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/articles.json docs/data/analyses.json
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { exit 0 }
          $ts = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm") + " UTC"
          git commit -m "chore: update articles $ts"
          git fetch origin main
          git rebase origin/main -X ours
          if ($LASTEXITCODE -ne 0) { git rebase --abort }
          git push --force-with-lease
