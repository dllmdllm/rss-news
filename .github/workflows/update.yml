name: Update RSS News

on:
  schedule:
    - cron: "*/20 * * * *"   # every 20 minutes
  workflow_dispatch:           # allow manual trigger
  push:
    branches: [main]
    paths-ignore:
      - "docs/data/**"        # avoid loop from runner's own commits

concurrency:
  group: update-rss
  # Let the running build finish — cancelling it mid-way when a build exceeds
  # the 20-min cron interval means nothing ever gets pushed. A newer queued run
  # will supersede older pending ones automatically.
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: python -m pip install --cache-dir "$env:LOCALAPPDATA\pip\Cache" -r requirements.txt

      - name: Fetch RSS, scrape & analyse
        run: python build.py
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/articles.json docs/data/analyses.json docs/data/feed.xml docs/data/content
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { Write-Host "no changes"; exit 0 }
          $ts = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm") + " UTC"
          git commit -m "chore: update articles $ts"
          if ($LASTEXITCODE -ne 0) { Write-Error "commit failed"; exit 1 }

          # Retry fetch → rebase → push up to 3 times. Each iteration
          # re-syncs origin/main so a concurrent push (Codex, or a prior
          # stuck chore commit) doesn't permanently wedge this one.
          # After rebase, HEAD is strictly ahead of origin/main, so plain
          # push is a fast-forward — no force / force-with-lease needed.
          $pushed = $false
          for ($i = 1; $i -le 3; $i++) {
            Write-Host "=== attempt $i ==="
            git fetch origin main --verbose 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host "fetch failed on attempt $i"
              Start-Sleep -Seconds 3
              continue
            }
            git rebase origin/main -X ours
            if ($LASTEXITCODE -ne 0) {
              Write-Host "rebase failed on attempt $i — aborting"
              git rebase --abort
              Start-Sleep -Seconds 3
              continue
            }
            Write-Host "--- git log before push ---"
            git log --oneline origin/main..HEAD
            git push origin HEAD:main --verbose 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "push OK on attempt $i"
              $pushed = $true
              break
            }
            Write-Host "push failed on attempt $i (exit $LASTEXITCODE)"
            Start-Sleep -Seconds 5
          }
          if (-not $pushed) {
            Write-Error "push failed after 3 attempts — see output above"
            exit 1
          }

      # Optional: notify Slack on build failure. Enable by uncommenting and
      # adding a SLACK_WEBHOOK_URL secret (Incoming Webhook URL from Slack
      # App → Features → Incoming Webhooks).
      # - name: Notify Slack on failure
      #   if: failure()
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      #   run: |
      #     $body = @{
      #       text = "rss-news build failed — run $env:GITHUB_RUN_ID on $env:GITHUB_REF"
      #     } | ConvertTo-Json
      #     Invoke-RestMethod -Uri $env:SLACK_WEBHOOK_URL -Method Post -Body $body -ContentType 'application/json'
