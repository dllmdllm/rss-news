<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新聞快訊</title>
  <style>
    :root {
      --bg:      #0f0f13;
      --surface: #1a1a22;
      --border:  #2e2e3e;
      --accent:  #7c6af7;
      --text:    #e0e0f0;
      --muted:   #888;
      --link:    #a89ff7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, "Noto Sans TC", sans-serif; min-height: 100vh; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 1.1rem; color: var(--accent); letter-spacing: .06em; }
    .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .updated {
      font-size: .78rem; color: var(--muted);
      cursor: pointer; user-select: none;
      border-bottom: 1px dashed transparent;
      transition: color .15s, border-color .15s;
    }
    .updated:hover  { color: var(--text); border-bottom-color: var(--muted); }
    .updated.busy   { color: var(--accent); border-bottom-color: transparent; cursor: default; }
    .updated.ok     { color: #4ade80; border-bottom-color: transparent; }

    /* new-articles toast */
    .news-toast {
      position: fixed; top: -60px; left: 50%; transform: translateX(-50%);
      background: #1a2e1a; border: 1px solid #3a6a3a; border-radius: 8px;
      padding: 8px 16px; display: flex; align-items: center; gap: 10px;
      font-size: .85rem; color: #7ce890; z-index: 100;
      box-shadow: 0 4px 16px #00000066;
      transition: top .3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
    }
    .news-toast.show { top: 12px; }
    .toast-refresh {
      background: #3a6a3a; border: none; color: #7ce890;
      padding: 3px 12px; border-radius: 4px; cursor: pointer; font-size: .82rem;
      transition: background .15s;
    }
    .toast-refresh:hover { background: #4a8a4a; }
    .toast-close {
      background: none; border: none; color: #7ce890;
      cursor: pointer; font-size: 1rem; padding: 0 2px; line-height: 1;
      opacity: .6;
    }
    .toast-close:hover { opacity: 1; }

    /* new card highlight */
    @keyframes newPulse {
      0%   { box-shadow: 0 0 0 3px #4ade8044; border-color: #4ade80; }
      100% { box-shadow: none; border-color: var(--border); }
    }
    .card-new { animation: newPulse 2.5s ease-out forwards; }

    /* Sort toggle */
    .sort-toggle { display: flex; gap: 4px; }
    .sort-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      padding: 3px 12px; border-radius: 999px; cursor: pointer; font-size: .78rem;
      transition: background .15s, color .15s, border-color .15s;
    }
    .sort-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Category filters */
    .filters {
      padding: 8px 24px; display: flex; flex-wrap: wrap; gap: 6px;
      border-bottom: 1px solid var(--border); background: var(--bg);
      position: sticky; top: 49px; z-index: 9;
    }
    .filter-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      padding: 4px 14px; border-radius: 999px; cursor: pointer; font-size: .8rem;
      transition: background .15s, color .15s, border-color .15s;
    }
    .filter-btn:hover  { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Tag filters */
    .tag-filters {
      padding: 6px 24px 8px; display: flex; flex-wrap: wrap; gap: 5px;
      background: var(--bg); border-bottom: 1px solid var(--border);
      position: sticky; top: 89px; z-index: 8;
    }
    .tag-filter-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 2px 10px; border-radius: 999px; cursor: pointer; font-size: .75rem;
      transition: background .15s, color .15s, border-color .15s;
    }
    .tag-filter-btn:hover  { border-color: #a78bfa; color: #a78bfa; }
    .tag-filter-btn.active { background: #3b1f6e; border-color: #a78bfa; color: #a78bfa; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px; padding: 20px 24px; max-width: 1600px; margin: 0 auto;
    }

    /* card */
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; display: flex; flex-direction: column;
      cursor: pointer; transition: border-color .15s, transform .1s;
      text-decoration: none; color: inherit;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-1px); }

    /* High importance highlight */
    .card.important { border-color: #f59e0b44; }
    .card.important:hover { border-color: #f59e0b; }

    /* thumbnail */
    .card-thumb {
      width: 100%; aspect-ratio: 16/9; object-fit: cover;
      background: var(--border); display: block;
    }
    .card-thumb-placeholder {
      width: 100%; aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1a1a2e 0%, #2e2e3e 100%);
      display: flex; align-items: center; justify-content: center;
      color: var(--border); font-size: 2rem;
    }

    /* card body */
    .card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 7px; flex: 1; }

    /* top row: cat + source + date + badges */
    .card-meta  { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .cat        { font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
    .cat-新聞   { background: #3d1a1a; color: #e87c7c; }
    .cat-國際   { background: #1a2a3d; color: #7cb4e8; }
    .cat-娛樂   { background: #3d1a30; color: #e87cc8; }
    .cat-消閒   { background: #1a3d22; color: #7ce890; }
    .cat-科技   { background: #3d2e1a; color: #e8b87c; }
    .cat-網媒   { background: #2a1a3d; color: #b87ce8; }
    .source     { font-size: .75rem; color: var(--accent); font-weight: 600; }
    .date       { font-size: .72rem; color: var(--muted); margin-left: auto; }

    /* score badge */
    .score-badge {
      font-size: .68rem; font-weight: 700; padding: 1px 6px; border-radius: 4px; flex-shrink: 0;
    }
    .score-high   { background: #7c1f1f; color: #f87171; }
    .score-mid    { background: #4a3a00; color: #fbbf24; }
    .score-low    { background: #1e1e2e; color: var(--muted); }

    /* sentiment dot */
    .sentiment {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .sent-positive { background: #4ade80; }
    .sent-negative { background: #f87171; }
    .sent-neutral  { background: #888; }

    /* cluster badge */
    .cluster-badge {
      font-size: .68rem; background: #1a2a3d; color: #7cb4e8;
      border: 1px solid #2a4060; padding: 1px 7px; border-radius: 4px;
      cursor: pointer; flex-shrink: 0;
    }
    .cluster-badge:hover { background: #2a4060; }

    .card-title   { font-size: 1.05rem; font-weight: 500; line-height: 1.5; }
    .card-title.cat-新聞 { color: #e87c7c; }
    .card-title.cat-國際 { color: #7cb4e8; }
    .card-title.cat-娛樂 { color: #e87cc8; }
    .card-title.cat-消閒 { color: #7ce890; }
    .card-title.cat-科技 { color: #e8b87c; }
    .card-title.cat-網媒 { color: #b87ce8; }
    .card-summary { font-size: .9rem; color: #aaa; line-height: 1.55; margin-top: 2px; }

    /* inline tags */
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag-chip {
      font-size: .68rem; background: #1e1a30; color: #a78bfa;
      border: 1px solid #3b2f60; padding: 1px 7px; border-radius: 4px;
    }

    .no-content   { font-size: .72rem; color: var(--muted); margin-top: auto; }

    .loading, .empty {
      grid-column: 1 / -1; text-align: center;
      padding: 60px; color: var(--muted); font-size: .9rem;
    }
  </style>
</head>
<body>
  <div class="news-toast" id="news-toast">
    <span id="toast-msg"></span>
    <button class="toast-refresh" id="toast-refresh">立即刷新</button>
    <button class="toast-close" id="toast-close">✕</button>
  </div>

  <header>
    <h1>新聞快訊</h1>
    <div class="header-right">
      <div class="sort-toggle" id="sort-toggle">
        <button class="sort-btn active" data-sort="date">最新</button>
        <button class="sort-btn" data-sort="score">最重要</button>
      </div>
      <span id="updated" class="updated"></span>
    </div>
  </header>
  <div class="filters"    id="filters"></div>
  <div class="tag-filters" id="tag-filters"></div>
  <div class="grid" id="grid"><div class="loading">載入中…</div></div>

  <script>
    const CATS = ["全部", "新聞", "國際", "娛樂", "消閒", "科技", "網媒"];
    let all = [], activeCat = "全部", activeTag = "", sortMode = "date";
    let loadedIds = new Set();   // IDs currently shown
    let pendingNew = new Set();  // IDs waiting to be revealed

    // ── Toast helpers ──────────────────────────────────────────────
    const toast        = document.getElementById("news-toast");
    const toastMsg     = document.getElementById("toast-msg");
    const toastRefresh = document.getElementById("toast-refresh");
    const toastClose   = document.getElementById("toast-close");

    function showToast(count) {
      toastMsg.textContent = `↑ ${count} 篇新文章`;
      toast.classList.add("show");
    }
    function hideToast() {
      toast.classList.remove("show");
    }
    toastClose.addEventListener("click", hideToast);
    toastRefresh.addEventListener("click", () => {
      hideToast();
      applyPending();
    });

    function applyPending() {
      const newIdsSnapshot = new Set(pendingNew);
      pendingNew.clear();
      all = pendingData.articles;
      loadedIds = new Set(all.map(a => a.id));
      buildTagFilters();
      renderFiltered();
      window.scrollTo({ top: 0, behavior: "smooth" });
      // highlight new cards after render
      setTimeout(() => {
        newIdsSnapshot.forEach(id => {
          const card = document.querySelector(`a.card[href="article.html?id=${id}"]`);
          if (card) card.classList.add("card-new");
        });
      }, 80);
    }

    let pendingData = null;

    // ── Initial load ───────────────────────────────────────────────
    async function load() {
      try {
        const res  = await fetch("data/articles.json?" + Date.now());
        const data = await res.json();
        const updEl = document.getElementById("updated");
        updEl.textContent = "更新：" + data.updated;
        all = data.articles;
        loadedIds = new Set(all.map(a => a.id));
        buildFilters();
        buildTagFilters();
        renderFiltered();
      } catch (e) {
        document.getElementById("grid").innerHTML = '<div class="empty">載入失敗，請重試</div>';
      }
    }

    // ── Check for updates (triggered by clicking the timestamp) ────
    async function checkUpdates() {
      const updEl = document.getElementById("updated");
      if (updEl.classList.contains("busy")) return;
      updEl.classList.add("busy");
      updEl.textContent = "檢查中…";

      try {
        const res  = await fetch("data/articles.json?" + Date.now());
        const data = await res.json();
        const freshIds  = new Set(data.articles.map(a => a.id));
        const newOnes   = data.articles.filter(a => !loadedIds.has(a.id));

        if (newOnes.length > 0) {
          pendingData = data;
          pendingNew  = new Set(newOnes.map(a => a.id));
          updEl.textContent = "更新：" + data.updated;
          showToast(newOnes.length);
        } else {
          updEl.classList.add("ok");
          updEl.textContent = "✓ 已是最新";
          setTimeout(() => {
            updEl.classList.remove("ok");
            updEl.textContent = "更新：" + data.updated;
          }, 2000);
        }
      } catch (e) {
        updEl.textContent = "更新：檢查失敗";
      }
      updEl.classList.remove("busy");
    }

    document.getElementById("updated").addEventListener("click", checkUpdates);

    function buildFilters() {
      const container = document.getElementById("filters");
      container.innerHTML = CATS.map(c =>
        `<button class="filter-btn${c === "全部" ? " active" : ""}" data-cat="${c}">${c}</button>`
      ).join("");
      container.addEventListener("click", e => {
        const btn = e.target.closest(".filter-btn");
        if (!btn) return;
        container.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeCat = btn.dataset.cat;
        renderFiltered();
      });
    }

    function buildTagFilters() {
      // Collect all unique tags across articles
      const tagCounts = {};
      all.forEach(a => (a.tags || []).forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
      // Show tags appearing ≥2 times, sorted by count desc
      const tags = Object.entries(tagCounts)
        .filter(([,c]) => c >= 2)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 20)
        .map(([t]) => t);

      const container = document.getElementById("tag-filters");
      if (!tags.length) { container.style.display = "none"; return; }
      container.innerHTML = tags.map(t =>
        `<button class="tag-filter-btn" data-tag="${t}"># ${t}</button>`
      ).join("");
      container.addEventListener("click", e => {
        const btn = e.target.closest(".tag-filter-btn");
        if (!btn) return;
        const tag = btn.dataset.tag;
        if (activeTag === tag) {
          activeTag = "";
          container.querySelectorAll(".tag-filter-btn").forEach(b => b.classList.remove("active"));
        } else {
          activeTag = tag;
          container.querySelectorAll(".tag-filter-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
        }
        renderFiltered();
      });
    }

    // Sort toggle
    document.getElementById("sort-toggle").addEventListener("click", e => {
      const btn = e.target.closest(".sort-btn");
      if (!btn) return;
      document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      sortMode = btn.dataset.sort;
      renderFiltered();
    });

    function getSorted(articles) {
      if (sortMode === "score") {
        return [...articles].sort((a, b) => {
          const sa = a.score ?? 5, sb = b.score ?? 5;
          if (sb !== sa) return sb - sa;
          return (b.date || "") > (a.date || "") ? 1 : -1;
        });
      }
      return articles; // already date-sorted from build.py
    }

    function filterCluster(cid) {
      activeTag = "";
      document.querySelectorAll(".tag-filter-btn").forEach(b => b.classList.remove("active"));
      const filtered = all.filter(a => a.cluster_id === cid);
      render(getSorted(filtered));
    }

    function renderFiltered() {
      let list = activeCat === "全部" ? all : all.filter(a => a.category === activeCat);
      if (activeTag) list = list.filter(a => (a.tags || []).includes(activeTag));
      render(getSorted(list));
    }

    function scoreClass(score) {
      if (!score) return "score-low";
      if (score >= 8) return "score-high";
      if (score >= 5) return "score-mid";
      return "score-low";
    }

    function render(articles) {
      const grid = document.getElementById("grid");
      if (!articles.length) {
        grid.innerHTML = '<div class="empty">沒有文章</div>';
        return;
      }
      grid.innerHTML = articles.map(a => {
        const date = a.date
          ? new Date(a.date).toLocaleString("zh-HK", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" })
          : "";
        const thumb = a.thumbnail
          ? `<img class="card-thumb" src="${a.thumbnail}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'card-thumb-placeholder\\'>📰</div>'">`
          : `<div class="card-thumb-placeholder">📰</div>`;

        const score    = a.score ?? null;
        const scoreBadge = score !== null
          ? `<span class="score-badge ${scoreClass(score)}">${score >= 8 ? "🔥 " : ""}${score}</span>`
          : "";

        const sentiment = a.sentiment || "neutral";
        const sentDot   = `<span class="sentiment sent-${sentiment}" title="${sentiment}"></span>`;

        const clusterBadge = a.cluster_size > 1
          ? `<span class="cluster-badge" data-cid="${a.cluster_id}" onclick="event.preventDefault();filterCluster('${a.cluster_id}')">${a.cluster_size} 來源</span>`
          : "";

        const tags = (a.tags || []).length
          ? `<div class="card-tags">${a.tags.map(t => `<span class="tag-chip">${t}</span>`).join("")}</div>`
          : "";

        return `<a class="card${score >= 8 ? " important" : ""}" href="article.html?id=${a.id}">
          ${thumb}
          <div class="card-body">
            <div class="card-meta">
              <span class="cat cat-${a.category}">${a.category}</span>
              <span class="source">${a.source}</span>
              ${scoreBadge}
              ${sentDot}
              ${clusterBadge}
              <span class="date">${date}</span>
            </div>
            <div class="card-title cat-${a.category}">${a.title}</div>
            ${tags}
            ${a.summary ? `<div class="card-summary">${a.summary}</div>` : ""}
            ${!a.content ? '<div class="no-content">↗ 外部連結</div>' : ""}
          </div>
        </a>`;
      }).join("");
    }

    load();
    // Background poll: silently check every 10 min, show toast if new articles found
    setInterval(async () => {
      if (document.hidden) return; // don't fetch if tab not visible
      try {
        const res  = await fetch("data/articles.json?" + Date.now());
        const data = await res.json();
        const newOnes = data.articles.filter(a => !loadedIds.has(a.id));
        if (newOnes.length > 0) {
          pendingData = data;
          pendingNew  = new Set(newOnes.map(a => a.id));
          document.getElementById("updated").textContent = "更新：" + data.updated;
          showToast(newOnes.length);
        }
      } catch (_) {}
    }, 10 * 60 * 1000);
  </script>
</body>
</html>
