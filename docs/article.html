<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#7c6af7">
  <link rel="manifest" href="manifest.json">
  <title>文章</title>
  <style>
    :root {
      --bg:      #0f0f13;
      --surface: #1a1a22;
      --border:  #2e2e3e;
      --accent:  #7c6af7;
      --text:    #e0e0f0;
      --muted:   #888;
      --link:    #a89ff7;
      --content: #d0d0e8;
      --summary-bg: #1e1e2e;
      --summary-text: #c0c0d8;
      --tag-bg: #1e1a30;
      --tag-border: #3b2f60;
      --tag-text: #a78bfa;
    }
    body.theme-light {
      --bg:      #fafaf8;
      --surface: #ffffff;
      --border:  #e6e6e0;
      --accent:  #1a6b9a;
      --text:    #141414;
      --muted:   #777;
      --link:    #1a6b9a;
      --content: #2f2f2f;
      --summary-bg: #f3f7fa;
      --summary-text: #333;
      --tag-bg: #f5edff;
      --tag-border: #dfccf5;
      --tag-text: #7d4ab0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, "Noto Sans TC", sans-serif; transition: background .18s, color .18s; }

    /* top bar */
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 24px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    .back { color: var(--accent); text-decoration: none; font-size: .9rem; flex-shrink: 0; }
    .back:hover { text-decoration: underline; }
    .topbar-source { font-size: .8rem; color: var(--muted); flex: 1; }
    .topbar-right { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; }

    /* reading progress bar */
    .read-progress {
      position: fixed; top: 0; left: 0; height: 2px;
      width: 0; background: var(--accent); z-index: 20;
      transition: width .08s linear;
    }

    /* font size buttons */
    .font-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
      font-weight: 700; display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s, border-color .15s;
    }
    .font-btn:hover { border-color: var(--accent); color: var(--text); }
    .text-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--accent);
      width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
      font-weight: 800; display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s, border-color .15s;
    }
    .text-btn:hover { border-color: var(--accent); color: var(--text); }
    .font-btn:first-child { font-size: .72rem; }
    .font-btn:last-child  { font-size: .92rem; }
    .font-btn.disabled { opacity: .3; cursor: default; pointer-events: none; }

    /* share button */
    .share-btn, .save-btn, .next-unread-btn, .tts-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: .8rem;
      transition: background .15s, color .15s, border-color .15s;
    }
    .share-btn:hover, .save-btn:hover, .next-unread-btn:hover, .tts-btn:hover { border-color: var(--accent); color: var(--text); }
    .share-btn.copied { border-color: #4ade80; color: #4ade80; }
    .save-btn.active { border-color: #fbbf24; color: #fbbf24; }
    .tts-btn.active { border-color: #4ade80; color: #4ade80; }
    .tts-btn.disabled { opacity: .35; pointer-events: none; }
    .next-unread-btn.disabled { opacity: .35; pointer-events: none; }

    /* article layout */
    main { max-width: 780px; margin: 0 auto; padding: 28px 24px 80px; }

    .art-meta {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .art-cat    { font-size: .72rem; font-weight: 700; padding: 2px 10px; border-radius: 4px; }
    .art-source { font-size: .8rem; color: var(--accent); font-weight: 600; text-decoration: none; }
    .art-source:hover { text-decoration: underline; }
    .art-date   { font-size: .78rem; color: var(--muted); }
    .art-readtime { font-size: .76rem; color: var(--muted); display: inline-flex; align-items: center; gap: 3px; }

    .art-score {
      font-size: .72rem; font-weight: 700; padding: 2px 8px; border-radius: 4px;
    }
    .score-high { background: #7c1f1f; color: #f87171; }
    .score-mid  { background: #4a3a00; color: #fbbf24; }
    .score-low  { background: #1e1e2e; color: var(--muted); }
    body.theme-light .score-high { background: #fee2e2; color: #dc2626; }
    body.theme-light .score-mid  { background: #fef3c7; color: #b45309; }
    body.theme-light .score-low  { background: #f1f1ee; color: var(--muted); }
    .art-sentiment { font-size: .72rem; padding: 2px 8px; border-radius: 4px; font-weight: 600; display: inline-flex; align-items: center; gap: 3px; }
    .sent-icon { font-weight: 700; font-size: .72rem; }
    .sent-positive { background: #14401f; color: #4ade80; }
    .sent-negative { background: #401414; color: #f87171; }
    .sent-neutral  { background: #1e1e2e; color: #888; }
    body.theme-light .sent-positive { background: #dcfce7; color: #15803d; }
    body.theme-light .sent-negative { background: #fee2e2; color: #dc2626; }
    body.theme-light .sent-neutral  { background: #f1f1ee; color: var(--muted); }

    .art-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .art-tag {
      font-size: .75rem; background: var(--tag-bg); color: var(--tag-text);
      border: 1px solid var(--tag-border); padding: 2px 10px; border-radius: 4px;
    }

    h1#art-title { font-weight: 700; line-height: 1.5; color: var(--text); margin-bottom: 24px; }

    /* article body */
    .content { line-height: 1.85; color: var(--content); }
    .content p      { margin-bottom: 1.2em; }
    .content h2,
    .content h3,
    .content h4     { font-size: 1em; font-weight: 700; color: var(--text); margin: 1.4em 0 .5em; }
    .content img    { max-width: 100%; height: auto; border-radius: 6px; margin: 1em 0; display: block; }
    .image-fallback {
      display: block; border: 1px dashed var(--border); color: var(--muted);
      padding: 18px; border-radius: 6px; margin: 1em 0; text-align: center;
      background: var(--surface); font-size: .86rem;
    }
    .content ul,
    .content ol     { padding-left: 1.4em; margin-bottom: 1em; }
    .content li     { margin-bottom: .4em; }
    .content figure { margin: 1.2em 0; }
    .content figcaption { font-size: .8rem; color: var(--muted); margin-top: .4em; }
    body.text-only .content img,
    body.text-only .content figure,
    body.text-only .image-fallback { display: none !important; }

    .no-content { text-align: center; padding: 60px 20px; color: var(--muted); }
    .ext-link {
      display: inline-block; margin-top: 16px;
      background: var(--accent); color: #fff; text-decoration: none;
      padding: 10px 24px; border-radius: 8px; font-size: .9rem;
    }

    .art-cat.cat-新聞 { background: #3d1a1a; color: #e87c7c; }
    .art-cat.cat-國際 { background: #1a2a3d; color: #7cb4e8; }
    .art-cat.cat-娛樂 { background: #3d1a30; color: #e87cc8; }
    .art-cat.cat-消閒 { background: #1a3d22; color: #7ce890; }
    .art-cat.cat-科技 { background: #3d2e1a; color: #e8b87c; }
    .art-cat.cat-網媒 { background: #2a1a3d; color: #b87ce8; }
    body.theme-light .art-cat.cat-新聞 { background: #fff0f0; color: #b94a4a; }
    body.theme-light .art-cat.cat-國際 { background: #edf6ff; color: #2f73a8; }
    body.theme-light .art-cat.cat-娛樂 { background: #fff0fa; color: #b64686; }
    body.theme-light .art-cat.cat-消閒 { background: #effaf1; color: #328746; }
    body.theme-light .art-cat.cat-科技 { background: #fff6e8; color: #a36a22; }
    body.theme-light .art-cat.cat-網媒 { background: #f5edff; color: #7d4ab0; }

    .loading { text-align: center; padding: 80px; color: var(--muted); }

    .summary-box {
      background: var(--summary-bg); border-left: 3px solid var(--accent);
      padding: 12px 16px; border-radius: 6px; margin-bottom: 24px;
      color: var(--summary-text); line-height: 1.6; white-space: pre-line;
    }
    .summary-label {
      display: block; font-size: .72rem; color: var(--accent);
      font-weight: 700; margin-bottom: 6px; letter-spacing: .05em;
    }
    .facts-box {
      background: var(--surface); border: 1px solid var(--border);
      padding: 12px 14px; border-radius: 6px; margin-bottom: 14px;
    }
    .facts-label {
      display: block; font-size: .72rem; color: var(--accent);
      font-weight: 700; margin-bottom: 8px; letter-spacing: .05em;
    }
    .facts-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .fact-chip {
      font-size: .76rem; color: var(--content); background: var(--summary-bg);
      border: 1px solid var(--border); padding: 3px 9px; border-radius: 4px;
    }
    .fact-chip.fact-type { color: #fbbf24; border-color: #4a3a00; background: #2b2208; }
    body.theme-light .fact-chip.fact-type { color: #9a6700; border-color: #f3d58a; background: #fff8e6; }

    .related-section {
      margin-top: 34px; padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .related-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 12px;
    }
    .related-title {
      font-size: .86rem; color: var(--accent); font-weight: 700;
      letter-spacing: .05em;
    }
    .related-toggle {
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface); color: var(--text);
      padding: 7px 12px; cursor: pointer; font-size: .82rem;
      transition: border-color .15s, color .15s, background .15s;
    }
    .related-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .related-list { display: grid; gap: 10px; }
    .related-ai-summary {
      display: none; flex-direction: column; gap: 9px;
      margin-bottom: 12px; padding: 12px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface);
    }
    .related-ai-summary.show { display: flex; }
    .related-ai-title {
      color: var(--accent); font-weight: 800; font-size: .86em;
      letter-spacing: .02em;
    }
    .related-digest-list {
      margin: 0; padding-left: 18px; line-height: 1.55;
      color: var(--content);
    }
    .related-source-list { display: flex; flex-direction: column; gap: 7px; }
    .related-source-row {
      padding-top: 7px; border-top: 1px solid var(--border);
    }
    .related-source-head {
      display: flex; gap: 7px; align-items: baseline;
      font-size: .86em; line-height: 1.45;
    }
    .related-source-name { flex: 0 0 auto; color: var(--accent); font-weight: 800; }
    .related-source-ago { flex: 0 0 auto; color: var(--muted); font-size: .85em; font-weight: 400; }
    .related-source-title { color: var(--text); }
    .related-source-points {
      margin-top: 4px; color: var(--muted); font-size: .84em; line-height: 1.45;
    }
    .related-empty-summary { color: var(--muted); font-size: .9em; }
    .article-text-toggle { margin-left: 2px; }
    .related-card {
      display: block; text-decoration: none; color: inherit;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface); padding: 11px 12px;
      transition: border-color .15s, transform .1s;
    }
    .related-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .related-meta {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      color: var(--muted); font-size: .72rem; margin-bottom: 5px;
    }
    .related-source { color: var(--accent); font-weight: 700; }
    .related-card-title { color: var(--text); line-height: 1.45; }
    .related-reason { color: var(--muted); font-size: .82em; margin-top: 6px; }

    /* ── article nav (prev / back / next) ── */
    .article-nav {
      display: flex; gap: 10px;
      margin-top: 36px; padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .nav-link {
      flex: 1; text-align: center;
      padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); text-decoration: none; font-size: .88rem;
      background: var(--surface);
      transition: border-color .15s, color .15s, background .15s;
      display: flex; align-items: center; justify-content: center; gap: 4px;
      min-height: 40px;
    }
    .nav-link:hover:not(.disabled) { border-color: var(--accent); color: var(--accent); }
    .nav-link.disabled { opacity: .35; pointer-events: none; cursor: default; }
    .nav-link .nav-label { white-space: nowrap; }
    .nav-back { flex: 0 0 auto; min-width: 72px; color: var(--muted); }

    /* ── font size levels ── */
    body.fs-0 h1#art-title { font-size: 1.15rem; }
    body.fs-0 .content     { font-size: .85rem; }
    body.fs-0 .summary-box { font-size: .78rem; }
    body.fs-0 .related-list { font-size: .85rem; }
    body.fs-0 .related-ai-summary { font-size: .85rem; }
    body.fs-1 h1#art-title { font-size: 1.35rem; }   /* default */
    body.fs-1 .content     { font-size: 1rem; }
    body.fs-1 .summary-box { font-size: .88rem; }
    body.fs-1 .related-list { font-size: 1rem; }
    body.fs-1 .related-ai-summary { font-size: 1rem; }
    body.fs-2 h1#art-title { font-size: 1.55rem; }
    body.fs-2 .content     { font-size: 1.25rem; }
    body.fs-2 .summary-box { font-size: 1.05rem; }
    body.fs-2 .related-list { font-size: 1.25rem; }
    body.fs-2 .related-ai-summary { font-size: 1.25rem; }

    @media (max-width: 640px) {
      .topbar { padding: 10px 14px; gap: 8px; }
      .topbar-right { gap: 6px; }
      .topbar-source { display: none; }
      main { padding: 22px 16px 64px; }
      h1#art-title { line-height: 1.45; margin-bottom: 18px; }
      body.fs-0 h1#art-title { font-size: 1.05rem; }
      body.fs-1 h1#art-title { font-size: 1.2rem; }
      body.fs-2 h1#art-title { font-size: 1.38rem; }
      .content img { margin: .75em 0; }
      .article-nav { gap: 6px; margin-top: 28px; }
      .nav-link { padding: 9px 8px; font-size: .8rem; }
      .nav-back { min-width: 60px; }
      .related-toggle { padding: 6px 10px; font-size: .76rem; }
    }
  </style>
</head>
<body>
  <div class="read-progress" id="read-progress"></div>
  <div class="topbar">
    <a href="index.html" class="back">← 返回</a>
    <span id="topbar-source" class="topbar-source"></span>
    <div class="topbar-right">
      <button class="font-btn" id="font-dec" title="縮小字體">A－</button>
      <button class="font-btn" id="font-inc" title="放大字體">A＋</button>
      <button class="tts-btn" id="tts-btn" type="button" title="朗讀文章">▶ 朗讀</button>
      <button class="save-btn" id="save-btn" type="button">收藏</button>
      <button class="next-unread-btn disabled" id="next-unread-btn" type="button">下一篇未讀</button>
      <button class="share-btn" id="share-btn">分享</button>
      <button class="text-btn article-text-toggle" id="text-toggle" type="button" title="切換純文字模式" aria-label="切換純文字模式">文</button>
    </div>
  </div>

  <main>
    <div id="loading" class="loading">載入中…</div>
    <div id="art-body" style="display:none">
      <div class="art-meta" id="art-meta"></div>
      <h1 id="art-title"></h1>
      <div class="art-tags" id="art-tags"></div>
      <div id="art-facts"></div>
      <div id="art-summary"></div>
      <div class="content" id="art-content"></div>
      <section class="related-section" id="related-section" style="display:none">
        <div class="related-header">
          <div class="related-title">相關新聞</div>
          <button class="related-toggle" id="related-toggle" type="button" aria-expanded="false" aria-controls="related-ai-summary">AI 綜合摘要</button>
        </div>
        <div class="related-ai-summary" id="related-ai-summary"></div>
        <div class="related-list" id="related-list"></div>
      </section>
      <nav class="article-nav" id="article-nav" aria-label="文章導航">
        <a class="nav-link nav-prev disabled" id="nav-prev" rel="prev" aria-label="上一篇"><span class="nav-label">← 上一篇</span></a>
        <a class="nav-link nav-back" id="nav-back" href="index.html" aria-label="返回列表"><span class="nav-label">返回</span></a>
        <a class="nav-link nav-next disabled" id="nav-next" rel="next" aria-label="下一篇"><span class="nav-label">下一篇 →</span></a>
      </nav>
    </div>
  </main>

  <script src="js/common.js"></script>
  <script src="js/article.js"></script>
</body>
</html>
